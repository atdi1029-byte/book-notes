<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1c2333"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#d4a0ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>
  <!-- Terminal prompt decoration -->
  <g opacity="0.06">
    <text x="30" y="100" font-family="monospace" font-size="14" fill="#bc8cff">$ claude --permission-mode plan</text>
    <text x="30" y="130" font-family="monospace" font-size="14" fill="#bc8cff">$ /compact "focus on hooks"</text>
    <text x="30" y="160" font-family="monospace" font-size="14" fill="#bc8cff">$ claude mcp add github</text>
    <text x="30" y="420" font-family="monospace" font-size="14" fill="#bc8cff">$ claude --worktree feature</text>
    <text x="30" y="450" font-family="monospace" font-size="14" fill="#bc8cff">$ /security-review</text>
    <text x="30" y="480" font-family="monospace" font-size="14" fill="#bc8cff">$ claude --resume my-session</text>
  </g>
  <!-- Accent line -->
  <rect x="40" y="230" width="320" height="3" rx="1.5" fill="url(#accent)"/>
  <ellipse cx="200" cy="230" rx="160" ry="40" fill="url(#glow)"/>
  <!-- Title -->
  <text x="200" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#bc8cff">Advanced</text>
  <text x="200" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#d4a0ff">Claude Code</text>
  <!-- Subtitle -->
  <text x="200" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#e6edf3">Mastery</text>
  <text x="200" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8b949e" font-style="italic">Every Feature, Trick &amp;</text>
  <text x="200" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8b949e" font-style="italic">Power Move</text>
  <!-- Author -->
  <text x="200" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#e6edf3">Alex Barnett</text>
  <text x="200" y="545" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8b949e">&amp; Claude</text>
  <rect x="40" y="565" width="320" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>

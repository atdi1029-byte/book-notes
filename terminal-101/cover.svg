<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1c2333"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#56d364"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>
  <!-- Terminal prompt decoration -->
  <g opacity="0.06">
    <text x="30" y="100" font-family="monospace" font-size="14" fill="#3fb950">$ caffeinate claude</text>
    <text x="30" y="130" font-family="monospace" font-size="14" fill="#3fb950">$ git push origin main</text>
    <text x="30" y="160" font-family="monospace" font-size="14" fill="#3fb950">$ echo $PATH</text>
    <text x="30" y="420" font-family="monospace" font-size="14" fill="#3fb950">$ chmod +x ./discover.sh</text>
    <text x="30" y="450" font-family="monospace" font-size="14" fill="#3fb950">$ adb shell am start</text>
    <text x="30" y="480" font-family="monospace" font-size="14" fill="#3fb950">$ cat data.json | jq '.'</text>
  </g>
  <!-- Prompt cursor -->
  <g opacity="0.15">
    <text x="200" y="290" text-anchor="middle" font-family="monospace" font-size="48" fill="#3fb950">$_</text>
  </g>
  <!-- Accent line -->
  <rect x="40" y="230" width="320" height="3" rx="1.5" fill="url(#accent)"/>
  <ellipse cx="200" cy="230" rx="160" ry="40" fill="url(#glow)"/>
  <!-- Title -->
  <text x="200" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#3fb950">Terminal 101</text>
  <text x="200" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#56d364">for Vibe Coders</text>
  <!-- Subtitle -->
  <text x="200" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#8b949e" font-style="italic">Understand the Commands</text>
  <text x="200" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#8b949e" font-style="italic">You Already Use</text>
  <!-- Author -->
  <text x="200" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#e6edf3">Alex Barnett</text>
  <text x="200" y="545" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8b949e">&amp; Claude</text>
  <rect x="40" y="565" width="320" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>

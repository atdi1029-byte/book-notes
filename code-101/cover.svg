<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1c2333"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>
  <!-- Code brackets decoration -->
  <g opacity="0.08" fill="none" stroke="#58a6ff" stroke-width="1.5">
    <text x="30" y="120" font-family="monospace" font-size="180" fill="#58a6ff" stroke="none">&lt;</text>
    <text x="260" y="530" font-family="monospace" font-size="180" fill="#58a6ff" stroke="none">/&gt;</text>
  </g>
  <!-- Accent line -->
  <rect x="40" y="190" width="320" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Glow effect -->
  <ellipse cx="200" cy="190" rx="160" ry="40" fill="url(#glow)"/>
  <!-- Title -->
  <text x="200" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#58a6ff">Code 101</text>
  <text x="200" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#79c0ff">for Vibe Coders</text>
  <!-- Subtitle -->
  <text x="200" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#8b949e" font-style="italic">Learn to Read the Code</text>
  <text x="200" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#8b949e" font-style="italic">Claude Writes for You</text>
  <!-- Mini code snippet decoration -->
  <g opacity="0.15">
    <text x="80" y="280" font-family="monospace" font-size="11" fill="#3fb950">function</text>
    <text x="145" y="280" font-family="monospace" font-size="11" fill="#79c0ff">toast</text>
    <text x="176" y="280" font-family="monospace" font-size="11" fill="#e6edf3">(msg) {</text>
    <text x="100" y="296" font-family="monospace" font-size="11" fill="#e6edf3">el.</text>
    <text x="120" y="296" font-family="monospace" font-size="11" fill="#79c0ff">classList</text>
    <text x="178" y="296" font-family="monospace" font-size="11" fill="#e6edf3">.</text>
    <text x="183" y="296" font-family="monospace" font-size="11" fill="#79c0ff">add</text>
    <text x="205" y="296" font-family="monospace" font-size="11" fill="#3fb950">('visible')</text>
    <text x="80" y="312" font-family="monospace" font-size="11" fill="#e6edf3">}</text>
  </g>
  <!-- Author -->
  <text x="200" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#e6edf3">Alex Barnett</text>
  <text x="200" y="505" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8b949e">&amp; Claude</text>
  <!-- Bottom accent -->
  <rect x="40" y="540" width="320" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>

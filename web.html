<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>Book Web — Cross-Reference Map</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #ffffff;
  color: #3a2e1e;
  font-family: Georgia, 'Times New Roman', serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* Loading */
.loading {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #ffffff;
  transition: opacity 0.5s;
}

.loading.done { opacity: 0; pointer-events: none; }

.loading h2 {
  color: #3a2e1e;
  font-size: 1.3rem;
  margin-bottom: 12px;
}

.loading .progress {
  font-size: 0.85rem;
  color: rgba(0,0,0,0.4);
  font-family: -apple-system, sans-serif;
}

.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(0,0,0,0.1);
  border-top-color: #4a9a8f;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Header */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.7) 80%, transparent 100%);
}

.back-link {
  display: flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  color: rgba(0,0,0,0.5);
  font-size: 0.8rem;
  font-family: -apple-system, sans-serif;
  padding: 6px 14px;
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 20px;
  transition: all 0.2s;
  white-space: nowrap;
}

.back-link:hover {
  color: #3a2e1e;
  border-color: rgba(0,0,0,0.3);
  background: rgba(0,0,0,0.04);
}

.back-link svg {
  width: 14px; height: 14px;
  stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

.header h1 {
  font-size: 1.2rem;
  color: #3a2e1e;
}

.header .stats {
  font-size: 0.75rem;
  color: rgba(0,0,0,0.4);
  font-family: -apple-system, sans-serif;
}

/* Legend */
.legend {
  position: fixed;
  bottom: 16px; left: 16px;
  z-index: 10;
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.7rem;
  font-family: -apple-system, sans-serif;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  max-width: 360px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  color: rgba(0,0,0,0.55);
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Info Panel */
.info-panel {
  position: fixed;
  top: 60px; right: 0;
  z-index: 10;
  width: 320px;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  background: rgba(255,255,255,0.96);
  border-left: 1px solid rgba(0,0,0,0.1);
  border-bottom: 1px solid rgba(0,0,0,0.1);
  border-radius: 0 0 0 12px;
  padding: 20px;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.15) transparent;
  box-shadow: -2px 2px 12px rgba(0,0,0,0.08);
}

.info-panel.open { transform: translateX(0); }

.info-panel .close-btn {
  position: absolute;
  top: 12px; right: 12px;
  background: none; border: none;
  color: rgba(0,0,0,0.35);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 4px 8px;
}

.info-panel .close-btn:hover { color: #3a2e1e; }

.info-panel h2 {
  font-size: 1.1rem;
  color: #3a2e1e;
  margin-bottom: 4px;
  padding-right: 30px;
}

.info-panel .author {
  font-size: 0.85rem;
  color: rgba(0,0,0,0.45);
  font-style: italic;
  margin-bottom: 16px;
}

.info-panel .view-notes {
  display: inline-block;
  font-size: 0.8rem;
  color: #4a7872;
  text-decoration: none;
  margin-bottom: 16px;
}

.info-panel .view-notes:hover { text-decoration: underline; color: #3a5f5a; }

.info-panel h3 {
  font-size: 0.85rem;
  color: rgba(0,0,0,0.5);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.connection-item {
  margin-bottom: 14px;
  padding: 10px 12px;
  background: rgba(0,0,0,0.02);
  border-radius: 8px;
  border-left: 3px solid;
  cursor: pointer;
  transition: background 0.2s;
}

.connection-item:hover { background: rgba(0,0,0,0.05); }

.connection-item .book-name {
  font-size: 0.9rem;
  font-weight: 700;
  color: #3a2e1e;
  margin-bottom: 4px;
}

.connection-item .shared-label {
  font-size: 0.72rem;
  color: rgba(0,0,0,0.4);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}

.connection-item .thinkers {
  font-size: 0.82rem;
  color: rgba(0,0,0,0.55);
  line-height: 1.5;
}

.connection-item .thinker-name {
  display: inline-block;
  background: rgba(0,0,0,0.05);
  padding: 1px 7px;
  border-radius: 10px;
  margin: 2px 2px;
  font-size: 0.78rem;
}

.ref-direction {
  font-size: 0.78rem;
  color: rgba(0,0,0,0.55);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.ref-arrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: 0.72rem;
  font-weight: 700;
  flex-shrink: 0;
}

.ref-arrow.out { background: rgba(74,154,143,0.15); color: #4a9a8f; }
.ref-arrow.in { background: rgba(197,165,90,0.15); color: #c5a55a; }

.ref-detail {
  margin: 3px 0 8px 25px;
  padding: 7px 10px;
  background: rgba(0,0,0,0.025);
  border-radius: 6px;
  border-left: 2px solid rgba(0,0,0,0.08);
}

.ref-name {
  font-size: 0.84rem;
  font-weight: 600;
  color: #3a2e1e;
}

.ref-desc {
  font-size: 0.76rem;
  color: rgba(0,0,0,0.45);
  margin-top: 2px;
  line-height: 1.4;
  font-style: italic;
}

.no-refs-note {
  font-size: 0.8rem;
  color: rgba(0,0,0,0.35);
  font-style: italic;
  margin-top: 4px;
  padding: 8px 10px;
  background: rgba(0,0,0,0.02);
  border-radius: 6px;
}

/* SVG */
svg { display: block; }

.link {
  stroke-opacity: 0.2;
  fill: none;
}

.link.highlighted { stroke-opacity: 0.6; }
.link.dimmed { stroke-opacity: 0.04; }

.node-circle {
  stroke: rgba(0,0,0,0.15);
  stroke-width: 1.5;
  cursor: pointer;
  transition: stroke 0.2s, stroke-width 0.2s;
}

.node-circle:hover {
  stroke: rgba(0,0,0,0.4);
  stroke-width: 2.5;
}

.node-circle.selected { stroke: #3a2e1e; stroke-width: 3; }
.node-circle.dimmed { opacity: 0.15; }

.node-cover { cursor: pointer; }
.node-cover.dimmed { opacity: 0.15; }

.node-label {
  font-family: -apple-system, sans-serif;
  font-size: 10px;
  fill: rgba(0,0,0,0.6);
  pointer-events: none;
  text-anchor: middle;
}

.node-label.dimmed { opacity: 0.1; }

.edge-label {
  font-family: -apple-system, sans-serif;
  font-size: 8px;
  fill: rgba(0,0,0,0.25);
  pointer-events: none;
  text-anchor: middle;
}

.edge-label.dimmed { opacity: 0; }
.edge-label.highlighted { fill: rgba(0,0,0,0.5); }

/* Tooltip */
.tooltip {
  position: fixed;
  z-index: 20;
  background: rgba(255,255,255,0.96);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.78rem;
  color: #3a2e1e;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 200px;
  font-family: -apple-system, sans-serif;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.tooltip.show { opacity: 1; }

/* Mobile */
@media (max-width: 600px) {
  .header h1 { font-size: 1rem; }
  .header .stats { display: none; }
  .legend { bottom: 10px; left: 10px; padding: 8px 10px; font-size: 0.65rem; max-width: 280px; }
  .info-panel {
    width: 100%;
    top: auto; bottom: 0; right: 0;
    max-height: 55vh;
    border-radius: 12px 12px 0 0;
    border-left: none;
    border-top: 1px solid rgba(0,0,0,0.1);
    transform: translateY(100%);
  }
  .info-panel.open { transform: translateY(0); }
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <h2>Building Book Web</h2>
  <div class="progress" id="loadProgress">Fetching shelf data...</div>
</div>

<div class="header">
  <a class="back-link" href="index.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Shelf
  </a>
  <h1>Book Web</h1>
  <span class="stats" id="stats"></span>
</div>

<div class="legend" id="legend"></div>

<div class="info-panel" id="infoPanel">
  <button class="close-btn" onclick="closePanel()">&times;</button>
  <div id="panelContent"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<svg id="graph"></svg>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ── Category colors ──
const CATEGORIES = {
  'Personal Finance': '#c5a55a',
  'Economics': '#4a9a8f',
  'Cycles': '#b87333',
  'History': '#6b8f8b',
  'Self Help': '#e07a5f',
  'Sociology': '#c49a3c',
  'Philosophy': '#9b7fbf',
  'Psychology': '#5b9bd5'
};

// ── Dynamic Data Loading ──
async function loadBookData() {
  const progress = document.getElementById('loadProgress');

  // 1. Fetch shelf page to discover all books
  progress.textContent = 'Fetching shelf data...';
  let shelfHtml;
  try {
    const resp = await fetch('index.html');
    shelfHtml = await resp.text();
  } catch(e) {
    progress.textContent = 'Error loading shelf: ' + e.message;
    return null;
  }

  // 2. Parse shelf HTML to extract books
  const parser = new DOMParser();
  const shelfDoc = parser.parseFromString(shelfHtml, 'text/html');
  const books = [];

  const sections = shelfDoc.querySelectorAll('.section-title');
  sections.forEach(section => {
    // Skip non-book sections
    if (section.id === 'readingTitle') return;
    const category = section.textContent.trim();
    if (category === 'Guides') return;
    const shelf = section.nextElementSibling;
    if (!shelf || !shelf.classList.contains('shelf')) return;

    shelf.querySelectorAll('.book').forEach(bookEl => {
      const href = bookEl.getAttribute('href');
      if (!href) return;
      // Skip hidden books
      if (bookEl.style.display === 'none') return;
      // Skip plain English companion versions
      if (href.includes('plain.html')) return;
      const dir = href.split('/')[0];
      const title = bookEl.querySelector('.book-title')?.textContent?.trim() || dir;
      const author = bookEl.querySelector('.book-author')?.textContent?.trim() || '';
      const id = bookEl.dataset.book || dir;
      books.push({ id, title, author, dir, category, thinkers: [], refRows: [] });
    });
  });

  // 3. Fetch each book's index.html and parse referenced works
  progress.textContent = `Scanning ${books.length} books for references...`;
  let loaded = 0;

  await Promise.all(books.map(async (book) => {
    try {
      const resp = await fetch(`${book.dir}/index.html`);
      const html = await resp.text();
      const doc = parser.parseFromString(html, 'text/html');

      // Find "Books & Thinkers Referenced" section
      const h2s = doc.querySelectorAll('h2');
      let refH2 = null;
      for (const h2 of h2s) {
        if (h2.textContent.includes('Referenced')) {
          refH2 = h2;
          break;
        }
      }

      if (refH2) {
        // Find the table — might be direct sibling or inside a wrapper div
        let table = null;
        let el = refH2.nextElementSibling;
        for (let i = 0; i < 5 && el; i++) {
          if (el.tagName === 'TABLE') { table = el; break; }
          if (el.tagName === 'H2') break;
          const inner = el.querySelector('table');
          if (inner) { table = inner; break; }
          el = el.nextElementSibling;
        }

        if (table) {
          table.querySelectorAll('tr').forEach(tr => {
            const tds = tr.querySelectorAll('td');
            if (tds.length >= 1) {
              let name = tds[0].textContent.trim();
              name = name.replace(/\s*\(.*\)\s*$/, '').trim();
              name = name.replace(/["""'']/g, '').trim();
              const desc = tds.length >= 2 ? tds[1].textContent.trim() : '';
              if (name && name.length > 1) {
                book.thinkers.push(name);
                book.refRows.push({ name, desc });
              }
            }
          });
        }
      }
    } catch(e) {
      // Book page not found — no thinkers
    }
    loaded++;
    progress.textContent = `Scanned ${loaded} of ${books.length} books...`;
  }));

  // 4. Generate short labels for nodes
  books.forEach(b => {
    b.short = shortenTitle(b.title);
  });

  return books;
}

function shortenTitle(title) {
  // Create 2-line short labels for graph nodes
  const map = {
    'Personal Finance For Dummies': 'Personal\nFinance',
    'I Will Teach You to Be Rich': 'I Will Teach\nYou to Be Rich',
    'Asset Allocation': 'Asset\nAllocation',
    "The Bogleheads' Guide to Investing": "Bogleheads'\nGuide",
    'Bond Markets, Analysis, and Strategies': 'Bond\nMarkets',
    'Talking to My Daughter About the Economy': 'Talking to\nMy Daughter',
    'The Wealth of Nations': 'Wealth of\nNations',
    'Big Debt Crises': 'Big Debt\nCrises',
    'Capital Wars': 'Capital\nWars',
    'Economics 101': 'Economics\n101',
    'Capitalism and Freedom': 'Capitalism\n& Freedom',
    'Cycles: The Science of Prediction': 'Cycles',
    'The Golden Constant': 'Golden\nConstant',
    'Against the Gods': 'Against\nthe Gods',
    'A History of Money and Banking in the United States': 'History of\nMoney & Banking',
    'Atomic Habits': 'Atomic\nHabits',
    'Bowling Alone': 'Bowling\nAlone',
    'Fooled by Randomness': 'Fooled by\nRandomness',
  };
  if (map[title]) return map[title];
  // Default: if title is long, split at midpoint space
  if (title.length > 14) {
    const mid = Math.floor(title.length / 2);
    const spaceAfter = title.indexOf(' ', mid);
    const spaceBefore = title.lastIndexOf(' ', mid);
    const splitAt = (spaceAfter !== -1 && spaceAfter - mid < mid - spaceBefore) ? spaceAfter : spaceBefore;
    if (splitAt > 0) return title.substring(0, splitAt) + '\n' + title.substring(splitAt + 1);
  }
  return title;
}

// ── Extract surnames from an author string ──
function getAuthorSurnames(authorStr) {
  // Handle "Larimore, Lindauer & LeBoeuf", "William Strauss & Neil Howe", "Frank J. Fabozzi"
  const parts = authorStr.split(/[,&]+/).map(s => s.trim()).filter(Boolean);
  return parts.map(part => {
    const words = part.split(/\s+/);
    return words[words.length - 1]; // last word = surname
  }).filter(s => s.length >= 3);
}

// ── Compute Edges: does Book A reference Book B's author? ──
function computeEdges(books) {
  const edges = [];
  const edgeMap = {}; // "idA|idB" → edge (for merging bidirectional)

  for (let i = 0; i < books.length; i++) {
    for (let j = 0; j < books.length; j++) {
      if (i === j) continue;
      if (!books[i].refRows.length) continue;

      const targetSurnames = getAuthorSurnames(books[j].author);
      const matches = [];

      for (const ref of books[i].refRows) {
        const refNameLower = ref.name.toLowerCase();
        const refDescLower = ref.desc.toLowerCase();
        const fullText = refNameLower + ' ' + refDescLower;

        // Check if this reference row mentions the target book's author
        for (const sn of targetSurnames) {
          if (refNameLower.includes(sn.toLowerCase())) {
            matches.push({ name: ref.name, desc: ref.desc, matchType: 'author' });
            break;
          }
        }

        // Also check if the row mentions the target book's title
        const titleLower = books[j].title.toLowerCase();
        if (fullText.includes(titleLower)) {
          matches.push({ name: ref.name, desc: ref.desc, matchType: 'title' });
        }
      }

      if (matches.length > 0) {
        // Create undirected edge key (alphabetical order)
        const key = [books[i].id, books[j].id].sort().join('|');
        if (!edgeMap[key]) {
          edgeMap[key] = {
            source: books[i].id,
            target: books[j].id,
            refs: {},  // { bookId: [{name, desc, matchType}] }
            weight: 0
          };
        }
        // Deduplicate by name
        const seen = new Set();
        edgeMap[key].refs[books[i].id] = matches.filter(m => {
          if (seen.has(m.name)) return false;
          seen.add(m.name);
          return true;
        });
        edgeMap[key].weight++;
      }
    }
  }

  return Object.values(edgeMap);
}

// ── Build D3 Graph ──
function buildGraph(books, edges) {
  // Hide loading
  document.getElementById('loading').classList.add('done');

  // Stats
  const connectedBooks = new Set();
  edges.forEach(e => { connectedBooks.add(e.source); connectedBooks.add(e.target); });
  document.getElementById('stats').textContent =
    `${books.length} books · ${edges.length} cross-references`;

  // Legend
  const legendEl = document.getElementById('legend');
  const usedCats = new Set(books.map(b => b.category));
  for (const [cat, color] of Object.entries(CATEGORIES)) {
    if (!usedCats.has(cat)) continue;
    legendEl.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:${color}"></span>${cat}</span>`;
  }

  // SVG setup
  const width = window.innerWidth;
  const height = window.innerHeight;

  const svg = d3.select('#graph')
    .attr('width', width)
    .attr('height', height);

  const g = svg.append('g');
  const zoom = d3.zoom()
    .scaleExtent([0.3, 4])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  // Nodes
  const nodes = books.map(b => ({
    ...b,
    connectionCount: edges.filter(e => e.source === b.id || e.target === b.id).length
  }));

  // Links
  const links = edges.map(e => ({ ...e }));

  // Scales
  const maxConn = d3.max(nodes, d => d.connectionCount) || 1;
  const radiusScale = d3.scaleSqrt().domain([0, maxConn]).range([22, 38]);
  const linkWidthScale = d3.scaleLinear().domain([1, d3.max(edges, e => e.weight) || 1]).range([1, 4]);

  // Simulation
  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id)
      .distance(d => 180 - d.weight * 15)
      .strength(d => 0.3 + d.weight * 0.05))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => radiusScale(d.connectionCount) + 20))
    .force('x', d3.forceX(width / 2).strength(0.05))
    .force('y', d3.forceY(height / 2).strength(0.05));

  // Expand undirected links into directed sub-edges for arrow rendering
  const directedLinks = [];
  links.forEach(l => {
    const srcId = l.source.id || l.source;
    const tgtId = l.target.id || l.target;
    // If source book references target's author → arrow from source to target
    if (l.refs[srcId] && l.refs[srcId].length > 0) {
      directedLinks.push({ ...l, dirSource: srcId, dirTarget: tgtId, parentLink: l });
    }
    // If target book references source's author → arrow from target to source
    if (l.refs[tgtId] && l.refs[tgtId].length > 0) {
      directedLinks.push({ ...l, dirSource: tgtId, dirTarget: srcId, parentLink: l });
    }
  });

  // Draw directed edges as paths with arrow markers
  const link = g.append('g').selectAll('path')
    .data(directedLinks).enter().append('path')
    .attr('class', 'link')
    .attr('stroke', d => {
      const src = books.find(b => b.id === d.dirSource);
      return CATEGORIES[src?.category] || '#4a9a8f';
    })
    .attr('stroke-width', d => linkWidthScale(d.parentLink.weight))
    .attr('marker-end', 'url(#arrow)')
    .attr('fill', 'none');

  // Remove old edge count labels (confusing "1"s)
  const edgeLabel = g.append('g').selectAll('text')
    .data([]).enter().append('text');

  // Defs: clip paths + arrow markers
  const defs = svg.append('defs');
  nodes.forEach(d => {
    defs.append('clipPath')
      .attr('id', 'clip-' + d.id)
      .append('circle')
      .attr('r', radiusScale(d.connectionCount));
  });

  // Arrow marker for directed edges
  defs.append('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 8)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-3.5L8,0L0,3.5')
    .attr('fill', 'rgba(0,0,0,0.18)');

  defs.append('marker')
    .attr('id', 'arrow-hl')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 8)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-3.5L8,0L0,3.5')
    .attr('fill', 'rgba(0,0,0,0.45)');

  // Draw nodes
  const node = g.append('g').selectAll('g')
    .data(nodes).enter().append('g')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  // Cover art image clipped to circle
  node.append('image')
    .attr('href', d => d.dir + '/cover.jpg')
    .attr('x', d => -radiusScale(d.connectionCount))
    .attr('y', d => -radiusScale(d.connectionCount))
    .attr('width', d => radiusScale(d.connectionCount) * 2)
    .attr('height', d => radiusScale(d.connectionCount) * 2)
    .attr('preserveAspectRatio', 'xMidYMid slice')
    .attr('clip-path', d => `url(#clip-${d.id})`)
    .attr('class', 'node-cover');

  // Border circle on top
  node.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => radiusScale(d.connectionCount))
    .attr('fill', 'none');

  // Connection count badge
  const badgeGroup = node.filter(d => d.connectionCount > 0);
  badgeGroup.append('circle')
    .attr('cx', d => radiusScale(d.connectionCount) * 0.7)
    .attr('cy', d => -radiusScale(d.connectionCount) * 0.7)
    .attr('r', 9)
    .attr('fill', d => CATEGORIES[d.category] || '#4a9a8f')
    .attr('stroke', '#fff')
    .attr('stroke-width', 1.5);
  badgeGroup.append('text')
    .attr('x', d => radiusScale(d.connectionCount) * 0.7)
    .attr('y', d => -radiusScale(d.connectionCount) * 0.7)
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'central')
    .attr('fill', '#fff')
    .attr('font-size', '8px')
    .attr('font-family', '-apple-system, sans-serif')
    .attr('font-weight', '700')
    .attr('pointer-events', 'none')
    .text(d => d.connectionCount);

  // Labels
  node.each(function(d) {
    const lines = d.short.split('\n');
    const el = d3.select(this);
    lines.forEach((line, i) => {
      el.append('text')
        .attr('class', 'node-label')
        .attr('dy', `${(i - (lines.length - 1) / 2) * 12 + radiusScale(d.connectionCount) + 14}px`)
        .text(line);
    });
  });

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  node.on('mouseover', (event, d) => {
    let tip = `<strong>${d.title}</strong>`;
    if (d.connectionCount > 0) {
      tip += `<br>${d.connectionCount} connection${d.connectionCount !== 1 ? 's' : ''}`;
    } else if (d.refRows.length === 0) {
      tip += `<br><em>No reference table yet</em>`;
    } else {
      tip += `<br><em>No shelf cross-references</em>`;
    }
    tooltip.innerHTML = tip;
    tooltip.classList.add('show');
  })
  .on('mousemove', event => {
    tooltip.style.left = (event.clientX + 14) + 'px';
    tooltip.style.top = (event.clientY - 10) + 'px';
  })
  .on('mouseout', () => tooltip.classList.remove('show'));

  // Click
  node.on('click', (event, d) => {
    event.stopPropagation();
    tooltip.classList.remove('show');
    selectNode(d, nodes, links, books, node, link, edgeLabel);
  });

  svg.on('click', () => clearSelection(node, link, edgeLabel));

  // Helper: find node object by id
  const nodeById = {};
  nodes.forEach(n => nodeById[n.id] = n);

  // Tick
  simulation.on('tick', () => {
    link.attr('d', d => {
      const src = nodeById[d.dirSource] || d.source;
      const tgt = nodeById[d.dirTarget] || d.target;
      if (!src.x || !tgt.x) return '';

      const dx = tgt.x - src.x;
      const dy = tgt.y - src.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const ux = dx / dist;
      const uy = dy / dist;

      // Offset start/end to node edge (radius)
      const r1 = radiusScale(src.connectionCount) + 4;
      const r2 = radiusScale(tgt.connectionCount) + 8; // extra for arrow
      const x1 = src.x + ux * r1;
      const y1 = src.y + uy * r1;
      const x2 = tgt.x - ux * r2;
      const y2 = tgt.y - uy * r2;

      // Check if bidirectional — offset perpendicular slightly
      const isBidirectional = d.parentLink.refs[d.dirSource] && d.parentLink.refs[d.dirTarget]
        && d.parentLink.refs[d.dirSource].length > 0 && d.parentLink.refs[d.dirTarget].length > 0;

      if (isBidirectional) {
        const off = 4; // perpendicular offset
        const px = -uy * off;
        const py = ux * off;
        return `M${x1 + px},${y1 + py}L${x2 + px},${y2 + py}`;
      }
      return `M${x1},${y1}L${x2},${y2}`;
    });

    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Resize
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    svg.attr('width', w).attr('height', h);
    simulation.force('center', d3.forceCenter(w / 2, h / 2));
    simulation.alpha(0.3).restart();
  });

  // Store refs for click handlers
  window._graphState = { nodes, links, books, node, link, edgeLabel };
}

function selectNode(d, nodes, links, books, node, link, edgeLabel) {
  const connectedEdges = links.filter(l =>
    (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id
  );
  const connectedIds = new Set([d.id]);
  connectedEdges.forEach(e => {
    connectedIds.add(e.source.id || e.source);
    connectedIds.add(e.target.id || e.target);
  });

  node.select('.node-circle')
    .classed('selected', n => n.id === d.id)
    .classed('dimmed', n => !connectedIds.has(n.id));
  node.select('.node-cover')
    .classed('dimmed', n => !connectedIds.has(n.id));
  node.selectAll('.node-label')
    .classed('dimmed', n => !connectedIds.has(n.id));
  link.classed('highlighted', l =>
    l.dirSource === d.id || l.dirTarget === d.id
  ).classed('dimmed', l =>
    l.dirSource !== d.id && l.dirTarget !== d.id
  ).attr('marker-end', l =>
    (l.dirSource === d.id || l.dirTarget === d.id) ? 'url(#arrow-hl)' : 'url(#arrow)'
  );

  // Build info panel
  const bookColor = CATEGORIES[d.category] || '#666';
  let html = `<h2 style="color:${bookColor}">${d.title}</h2>`;
  html += `<div class="author">${d.author}</div>`;
  html += `<a class="view-notes" href="${d.dir}/index.html">View full notes &rarr;</a>`;

  // Show reference table status
  if (d.refRows.length === 0) {
    html += `<div class="no-refs-note">This book doesn't have a Referenced Works section yet.</div>`;
  }

  if (connectedEdges.length === 0) {
    html += `<h3>No Connections</h3>`;
    html += `<p style="font-size:0.85rem;color:rgba(0,0,0,0.4)">No cross-references found with other books on your shelf.</p>`;
  } else {
    html += `<h3>Connections (${connectedEdges.length})</h3>`;
    connectedEdges.sort((a, b) => b.weight - a.weight);
    connectedEdges.forEach(edge => {
      const otherId = (edge.source.id || edge.source) === d.id
        ? (edge.target.id || edge.target)
        : (edge.source.id || edge.source);
      const other = books.find(b => b.id === otherId);
      if (!other) return;
      const otherColor = CATEGORIES[other.category] || '#666';

      // Get directional references (now full objects with name, desc, matchType)
      const thisRefs = edge.refs[d.id] || [];
      const otherRefs = edge.refs[otherId] || [];

      const shortThis = d.title.split(':')[0].split(',')[0];
      const shortOther = other.title.split(':')[0].split(',')[0];

      html += `<div class="connection-item" style="border-color:${otherColor}" onclick="navBook('${otherId}')">`;
      html += `<div class="book-name" style="color:${otherColor}">${other.title}</div>`;

      if (thisRefs.length > 0) {
        html += `<div class="ref-direction"><span class="ref-arrow out">&rarr;</span> <em>${shortThis}</em> references:</div>`;
        thisRefs.forEach(ref => {
          html += `<div class="ref-detail">`;
          html += `<div class="ref-name">${ref.name}</div>`;
          if (ref.desc) html += `<div class="ref-desc">${ref.desc}</div>`;
          html += `</div>`;
        });
      }
      if (otherRefs.length > 0) {
        html += `<div class="ref-direction" style="margin-top:8px"><span class="ref-arrow in">&larr;</span> <em>${shortOther}</em> references:</div>`;
        otherRefs.forEach(ref => {
          html += `<div class="ref-detail">`;
          html += `<div class="ref-name">${ref.name}</div>`;
          if (ref.desc) html += `<div class="ref-desc">${ref.desc}</div>`;
          html += `</div>`;
        });
      }

      html += `</div>`;
    });
  }

  document.getElementById('panelContent').innerHTML = html;
  document.getElementById('infoPanel').classList.add('open');
}

function navBook(id) {
  const s = window._graphState;
  const book = s.nodes.find(n => n.id === id);
  if (book) selectNode(book, s.nodes, s.links, s.books, s.node, s.link, s.edgeLabel);
}

function clearSelection(node, link, edgeLabel) {
  const s = window._graphState;
  if (!s) return;
  s.node.select('.node-circle').classed('selected', false).classed('dimmed', false);
  s.node.select('.node-cover').classed('dimmed', false);
  s.node.selectAll('.node-label').classed('dimmed', false);
  s.link.classed('highlighted', false).classed('dimmed', false).attr('marker-end', 'url(#arrow)');
  document.getElementById('infoPanel').classList.remove('open');
}

function closePanel() {
  clearSelection();
}

// ── Init ──
(async function() {
  const books = await loadBookData();
  if (!books) return;
  const edges = computeEdges(books);
  buildGraph(books, edges);
})();
</script>

</body>

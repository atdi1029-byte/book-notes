<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1c2333"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4822a"/>
      <stop offset="100%" stop-color="#e8944c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d4822a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4822a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>
  <!-- Decorative circuit lines -->
  <g stroke="#30363d" stroke-width="1" fill="none" opacity="0.5">
    <path d="M50 0 L50 150 L150 150"/>
    <path d="M350 0 L350 100 L250 100"/>
    <path d="M0 400 L100 400 L100 300"/>
    <path d="M400 500 L300 500 L300 450"/>
    <circle cx="50" cy="150" r="3" fill="#30363d"/>
    <circle cx="150" cy="150" r="3" fill="#30363d"/>
    <circle cx="350" cy="100" r="3" fill="#30363d"/>
    <circle cx="250" cy="100" r="3" fill="#30363d"/>
    <circle cx="100" cy="400" r="3" fill="#30363d"/>
    <circle cx="100" cy="300" r="3" fill="#30363d"/>
    <circle cx="300" cy="500" r="3" fill="#30363d"/>
    <circle cx="300" cy="450" r="3" fill="#30363d"/>
  </g>
  <!-- Neural network nodes -->
  <g opacity="0.15">
    <circle cx="100" cy="220" r="8" fill="#58a6ff"/>
    <circle cx="100" cy="260" r="8" fill="#58a6ff"/>
    <circle cx="100" cy="300" r="8" fill="#58a6ff"/>
    <circle cx="200" cy="240" r="8" fill="#bc8cff"/>
    <circle cx="200" cy="280" r="8" fill="#bc8cff"/>
    <circle cx="300" cy="260" r="8" fill="#3fb950"/>
    <line x1="100" y1="220" x2="200" y2="240" stroke="#58a6ff" stroke-width="1"/>
    <line x1="100" y1="220" x2="200" y2="280" stroke="#58a6ff" stroke-width="1"/>
    <line x1="100" y1="260" x2="200" y2="240" stroke="#58a6ff" stroke-width="1"/>
    <line x1="100" y1="260" x2="200" y2="280" stroke="#58a6ff" stroke-width="1"/>
    <line x1="100" y1="300" x2="200" y2="240" stroke="#58a6ff" stroke-width="1"/>
    <line x1="100" y1="300" x2="200" y2="280" stroke="#58a6ff" stroke-width="1"/>
    <line x1="200" y1="240" x2="300" y2="260" stroke="#bc8cff" stroke-width="1"/>
    <line x1="200" y1="280" x2="300" y2="260" stroke="#bc8cff" stroke-width="1"/>
  </g>
  <!-- Accent line -->
  <rect x="40" y="180" width="320" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Glow effect -->
  <ellipse cx="200" cy="180" rx="160" ry="40" fill="url(#glow)"/>
  <!-- Title -->
  <text x="200" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#e8944c">The Vibe Coder's</text>
  <text x="200" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#e8944c">Guide</text>
  <!-- Subtitle -->
  <text x="200" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#8b949e" font-style="italic">How LLMs Work &amp;</text>
  <text x="200" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#8b949e" font-style="italic">How to Master Claude Code</text>
  <!-- Author -->
  <text x="200" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#e6edf3">Alex Barnett</text>
  <text x="200" y="505" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8b949e">&amp; Claude</text>
  <!-- Bottom accent -->
  <rect x="40" y="540" width="320" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Code bracket decoration -->
  <text x="60" y="540" font-family="monospace" font-size="24" fill="#30363d" opacity="0.6">{</text>
  <text x="328" y="540" font-family="monospace" font-size="24" fill="#30363d" opacity="0.6">}</text>
</svg>
